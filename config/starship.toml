"$schema" = 'https://starship.rs/config-schema.json'

format = """$all\
$git_commit\
$time\
$line_break\
$jobs\
$battery\
$status\
$os\
$container\
$shell\
$character\
"""

command_timeout = 500

[fill]
symbol = ' '

[directory]
style = "blue"
truncate_to_repo = true
truncation_symbol = '.../'

[username]
show_always = false

[character]
success_symbol = "[\\$]()"
error_symbol = "[\\$](red)"
vimcmd_symbol = "[\\$](green)"

[git_branch]
format = "[$branch]($style) "
style = "bright-purple"

[git_commit]
disabled = false
only_detached = false
style = "hidden"

[git_status]
disabled = true
# Also read by git_metrics below (shared GitStatusConfig): forces it onto the
# `git diff --shortstat` subprocess path instead of gitoxide's in-process one,
# which reuses git_status's full working-tree scan. ~500ms -> ~30ms in repos
# with 10k+ tracked/ignored files (measured via `starship timings`).
use_git_executable = true
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "​"
untracked = "​"
modified = "​"
staged = "​"
renamed = "​"
deleted = "​"
stashed = "≡"

[git_state]
disabled = true
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "purple"

[git_metrics]
disabled = false
ignore_submodules = true

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[time]
disabled = false
format = '[$time]($style) '
time_format = '%Y-%m-%d %T'
style = "hidden"

[shlvl]
disabled = false
symbol = '> '

#================
