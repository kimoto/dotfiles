shell = "zsh"

[plugins.zsh-defer]
github = 'romkatv/zsh-defer'
apply = ['source']

[plugins.fzf]
github = 'junegunn/fzf'
apply = ['fzf-install', 'fzf-source']

[plugins.evalcache]
github = 'mroth/evalcache'
apply = ['source']

# Replace _evalcache with a no-fork variant (upstream forks md5 per call just
# to name the cache file). Must load before the _evalcache inlines below.
[plugins.evalcache.hooks]
post = 'source "${XDG_CONFIG_HOME:-$HOME/.config}/zsh/evalcache-no-fork.zsh"'

#================
# defer loading
#================
[plugins.zsh-completions]
github = 'zsh-users/zsh-completions'
apply = ['defer']

# Slow init; nothing needs `abbr` before the first prompt.
[plugins.zsh-abbr]
github = 'olets/zsh-abbr'
apply = ['defer']

[plugins.fast-syntax-highlighting]
github = 'zdharma-continuum/fast-syntax-highlighting'
apply = ['defer']

[plugins.fast-syntax-highlighting.hooks]
post = "test -e ~/.cache/fsh/current_theme.zsh || { command -v fast-theme >/dev/null && fast-theme -q ~/.config/fsh/solarized.ini --secondary=zdharma; }"

# Deferred last: MANUAL_REBIND skips the per-precmd widget rebind, which is
# only safe when no plugin defines widgets after this one loads.
[plugins.zsh-autosuggestions]
github = "zsh-users/zsh-autosuggestions"
apply = ['defer']

[plugins.zsh-autosuggestions.hooks]
post = """
export ZSH_AUTOSUGGEST_HIGHLIGHT_STYLE='fg=60'
export ZSH_AUTOSUGGEST_MANUAL_REBIND=1
export ZSH_AUTOSUGGEST_USE_ASYNC=1
export ZSH_AUTOSUGGEST_BUFFER_MAX_SIZE=500
"""

#================
# eval cache
#================
# Homebrew env (HOMEBREW_PREFIX, MANPATH, ...). The output is static per
# machine, so cache it instead of launching `brew` on every shell. Finding
# brew itself doesn't depend on this: .zshrc's path=() block already puts the
# Homebrew bin dirs on PATH.
[plugins.brew-shellenv]
inline = 'if (( $+commands[brew] )); then _evalcache brew shellenv; fi'

[plugins.starship]
inline = '_evalcache starship init zsh'

[plugins.zoxide]
inline = '_evalcache zoxide init zsh'

[plugins.mise]
inline = '_evalcache mise activate zsh'

[plugins.direnv]
inline = '_evalcache direnv hook zsh'

# kubectl's completion script is big enough that even the cached copy takes
# time to parse every startup: defer the parse past the first prompt. Guarded
# on kubectl so machines without it (kubectl ships in Brewfile.common, not
# basic) skip it silently.
[plugins.kubectl-completion]
inline = 'if (( $+commands[kubectl] )); then zsh-defer _evalcache kubectl completion zsh; fi'

# LS_COLORS palette. vivid prints a raw value (not shell code), so
# bin/vivid_ls_colors.sh (on PATH via ~/bin) wraps it in an export statement.
# Guarded so a vivid-less box stays silent instead of re-caching every startup.
# Only affects `ls`/`eza` colors, not the prompt, so defer it past the first
# prompt like kubectl's completion (~20ms measured via zprof).
[plugins.vivid-ls-colors]
inline = 'if (( $+commands[vivid] )); then zsh-defer _evalcache vivid_ls_colors.sh; fi'

# Multi-shell completion engine. Bridges to zsh's native completions
# (CARAPACE_BRIDGES in .zshrc) for commands it doesn't ship a spec for.
# Even the cached copy's compdef registrations are the single biggest
# _evalcache cost measured (~65ms via zprof) - defer past the first prompt,
# same reasoning as kubectl's completion above.
[plugins.carapace]
inline = 'zsh-defer _evalcache carapace _carapace zsh'

[templates]
defer = "{{ hooks?.pre | nl }}{% for file in files %}zsh-defer source \"{{ file }}\"\n{% endfor %}{{ hooks?.post | nl }}"
# Run fzf's install script only when no fzf binary is present yet.
fzf-install = "(( $+commands[fzf] )) || [[ -x \"{{ dir }}/bin/fzf\" ]] || {{ dir }}/install --bin > /dev/null\n[[ ! $PATH == *{{ dir }}* ]] && export PATH=\"$PATH:{{ dir }}/bin\"\n"
fzf-source = "{% for file in files %}source \"{{ file }}\"\n{% endfor %}"
