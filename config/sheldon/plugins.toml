shell = "zsh"

[plugins.zsh-defer]
github = 'romkatv/zsh-defer'
apply = ['source']

[plugins.fzf]
github = 'junegunn/fzf'
apply = ['fzf-install', 'fzf-source']

[plugins.evalcache]
github = 'mroth/evalcache'
apply = ['source']

#================
# defer loading
#================
[plugins.zsh-completions]
github = 'zsh-users/zsh-completions'
apply = ['defer']

[plugins.zsh-autosuggestions]
github = "zsh-users/zsh-autosuggestions"
apply = ['defer']

[plugins.zsh-autosuggestions.hooks]
post = "export ZSH_AUTOSUGGEST_HIGHLIGHT_STYLE='fg=60'"

[plugins.zsh-abbr]
github = 'olets/zsh-abbr'

[plugins.fast-syntax-highlighting]
github = 'zdharma-continuum/fast-syntax-highlighting'
apply = ['defer']

[plugins.fast-syntax-highlighting.hooks]
post = "test -e ~/.cache/fsh/current_theme.zsh || { command -v fast-theme >/dev/null && fast-theme -q ~/.config/fsh/solarized.ini --secondary=zdharma; }"

#================
# eval cache
#================
# Homebrew env (HOMEBREW_PREFIX, MANPATH, ...). The output is static per
# machine, so cache it instead of launching `brew` on every shell. Finding
# brew itself doesn't depend on this: .zshrc's path=() block already puts the
# Homebrew bin dirs on PATH.
[plugins.brew-shellenv]
inline = 'if (( $+commands[brew] )); then _evalcache brew shellenv; fi'

[plugins.starship]
inline = '_evalcache starship init zsh'

[plugins.zoxide]
inline = '_evalcache zoxide init zsh'

[plugins.mise]
inline = '_evalcache mise activate zsh'

[plugins.direnv]
inline = '_evalcache direnv hook zsh'

[plugins.kubectl-completion]
inline = '_evalcache kubectl completion zsh'

# LS_COLORS palette. vivid prints a raw value (not shell code), so
# bin/vivid_ls_colors.sh (on PATH via ~/bin) wraps it in an export statement.
# Guarded so a vivid-less box stays silent instead of re-caching every startup.
[plugins.vivid-ls-colors]
inline = 'if (( $+commands[vivid] )); then _evalcache vivid_ls_colors.sh; fi'

# Multi-shell completion engine. Bridges to zsh's native completions
# (CARAPACE_BRIDGES in .zshrc) for commands it doesn't ship a spec for.
[plugins.carapace]
inline = '_evalcache carapace _carapace zsh'

[templates]
defer = "{{ hooks?.pre | nl }}{% for file in files %}zsh-defer source \"{{ file }}\"\n{% endfor %}{{ hooks?.post | nl }}"
fzf-install = "{{ dir }}/install --bin > /dev/null \n[[ ! $PATH == *{{ dir }}* ]] && export PATH=\"$PATH:{{ dir }}/bin\"\n"
fzf-source = "{% for file in files %}source \"{{ file }}\"\n{% endfor %}"
