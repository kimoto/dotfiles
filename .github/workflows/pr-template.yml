---
# Backfill the PR template on PRs that were opened with an empty body.
#
# GitHub only injects .github/PULL_REQUEST_TEMPLATE.md when a PR is created
# through the web UI. PRs opened via the API — the Claude app's "Create PR"
# button, `gh`, or any remote/automation — start with an empty body, so the
# template never gets applied. This workflow restores that behaviour: when a PR
# opens with a blank body, it fills it in from the template file. A PR that
# already has a body (e.g. the UI did inject the template, or an author wrote
# one) is left untouched.
name: pr-template
on:
  pull_request:
    types: [opened]

permissions:
  contents: read
  pull-requests: write

jobs:
  backfill-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Inject PR template when the body is empty
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          # Passed via env (not interpolated into the script) so an attacker
          # cannot inject shell from the PR body.
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          template=".github/PULL_REQUEST_TEMPLATE.md"
          if [ ! -f "$template" ]; then
            echo "No $template in the repo; nothing to inject."
            exit 0
          fi
          # Strip all whitespace; if nothing remains the body was blank/null.
          if [ -n "${PR_BODY//[[:space:]]/}" ]; then
            echo "PR #$PR_NUMBER already has a body; leaving it untouched."
            exit 0
          fi
          gh pr edit "$PR_NUMBER" --body-file "$template"
          echo "Injected PR template into #$PR_NUMBER (body was empty)."
