---
name: ci
on:
  push: {}
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static_checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Install check tools
        run: ./bin/install_check_tools.sh
      - name: Lint shell scripts
        run: ./bin/lint_shell.sh
      - name: Lint zsh syntax
        run: ./bin/lint_zsh.sh
      - name: Validate config files
        run: ./bin/lint_config.sh
      - name: Validate config schemas
        run: ./bin/lint_schema.sh
      - name: Check editorconfig (line length, whitespace, final newline)
        run: ./bin/lint_editorconfig.sh
      - name: Check action pinning (ratchet)
        run: ./bin/lint_actions.sh
      - name: Check Brewfile sort
        run: ./bin/check_brewfile_sort.sh
      - name: Check for sensitive filenames
        run: ./bin/check_secret_files.sh
      - name: Scan for secrets (gitleaks)
        run: gitleaks git --no-banner --redact

  zsh_loading_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Restore Homebrew cache
        id: cache-brew
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            /opt/homebrew
            /home/linuxbrew/.linuxbrew
          key: ${{ runner.os }}-brew-${{ hashFiles('Brewfile.basic') }}

      - name: Install homebrew if cache miss
        if: steps.cache-brew.outputs.cache-hit != 'true'
        run: ./bin/setup_homebrew.sh

      - name: Make world
        run: SKIP_BREW=1 ./bin/mkworld.sh

      - name: Save Homebrew cache
        # Only save on a cache miss; saving on a hit re-uses the same key and
        # fails with "Cache already exists" (harmless warning).
        if: always() && steps.cache-brew.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            /opt/homebrew
            /home/linuxbrew/.linuxbrew
          key: ${{ steps.cache-brew.outputs.cache-primary-key }}

      - name: Load to test .zshrc
        run: ./bin/ci_zsh_loading_test.sh

      - name: Install tmux (Homebrew, to exercise the 3.6+ path)
        run: |
          set -e
          if [ -x /home/linuxbrew/.linuxbrew/bin/brew ]; then
            eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
            brew install tmux
          fi

      - name: Load to test .tmux.conf
        run: ./bin/ci_tmux_loading_test.sh
