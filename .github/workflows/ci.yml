---
name: ci
on:
  push: {}
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static_checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Install check tools
        run: ./bin/install_check_tools.sh
      - name: Lint shell scripts
        run: ./bin/lint_shell.sh
      - name: Run unit tests (bats)
        run: ./bin/run_tests.sh
      - name: Lint zsh syntax
        run: ./bin/lint_zsh.sh
      - name: Lint lua syntax
        run: ./bin/lint_lua.sh
      - name: Lint bash syntax
        run: ./bin/lint_bash.sh
      - name: Validate config files
        run: ./bin/lint_config.sh
      - name: Validate config schemas
        run: ./bin/lint_schema.sh
      - name: Check editorconfig (line length, whitespace, final newline)
        run: ./bin/lint_editorconfig.sh
      - name: Check action pinning (ratchet)
        run: ./bin/lint_actions.sh
      - name: Check Brewfile sort
        run: ./bin/check_brewfile_sort.sh
      - name: Check for sensitive filenames
        run: ./bin/check_secret_files.sh
      - name: Scan for secrets (gitleaks)
        run: gitleaks git --no-banner --redact
      - name: Check commit messages (Conventional Commits)
        # Same rule as the lefthook commit-msg hook, applied to every commit on
        # this branch — catches --no-verify and web-UI commits that bypass the
        # local hook. Needs the fetch-depth: 0 checkout above for origin/main.
        run: ./bin/check_commit_msgs_range.sh

  # bin/install_check_tools.sh maps uname -m onto each project's release-asset
  # naming, and the Claude Code web sandbox that runs it via the SessionStart
  # hook can be arm64. Every other job covers x86_64 only; this one downloads
  # the arm64 assets and exercises each installed binary for real via the lint
  # scripts that depend on it.
  toolchain_arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install check tools (arm64 release assets)
        run: ./bin/install_check_tools.sh
      - name: Exercise the toolchain (yq+biome, check-jsonschema, ratchet, ec)
        run: |
          ./bin/lint_config.sh
          ./bin/lint_schema.sh
          ./bin/lint_actions.sh
          ./bin/lint_editorconfig.sh
          gitleaks version
          lefthook version

  zsh_loading_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Restore Homebrew cache
        id: cache-brew
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            /opt/homebrew
            /home/linuxbrew/.linuxbrew
          # The -fzf-v3 suffix is part of the key on purpose: fzf is installed
          # into this cache below but is not in Brewfile.basic, so the suffix
          # forces a rebuild that bakes it in. Bump the vN to evict a bad cache
          # or when the set of extra brew installs changes. (tmux IS in
          # Brewfile.basic, so the hash already covers it.)
          key: ${{ runner.os }}-brew-${{ hashFiles('Brewfile.basic') }}-fzf-v3

      - name: Restore tmux plugins cache
        id: cache-tmux-plugins
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          # tpm clones every @tpm_plugins entry into here; cache them so later
          # runs skip the clones. Keyed on .tmux.conf since that is where the
          # plugin list lives — editing it re-resolves the plugin set. Bump the
          # vN to evict a bad cache (same manual lever as the brew key).
          path: ~/.tmux/plugins
          key: ${{ runner.os }}-tmux-plugins-${{ hashFiles('.tmux.conf') }}-v1

      - name: Prepare world (cache phase)
        # One entry point owns the installs (Homebrew + Brewfile.basic, then fzf,
        # then mkworld for symlinks/hooks/tpm plugins). BREW_CACHE_HIT lets it
        # skip the brew work on a hit; the actions/cache restore/save stay in YAML.
        run: ./bin/ci_prepare.sh
        env:
          BREW_CACHE_HIT: ${{ steps.cache-brew.outputs.cache-hit }}

      - name: Save Homebrew cache
        # Save only on a cache miss (saving on a hit re-uses the same key and
        # fails with "Cache already exists"). No always(): if the prepare step
        # failed, skip the save so a half-installed tree never poisons the cache.
        if: steps.cache-brew.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            /opt/homebrew
            /home/linuxbrew/.linuxbrew
          key: ${{ steps.cache-brew.outputs.cache-primary-key }}

      - name: Save tmux plugins cache
        if: steps.cache-tmux-plugins.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.tmux/plugins
          key: ${{ steps.cache-tmux-plugins.outputs.cache-primary-key }}

      - name: Load to test .zshrc
        run: ./bin/ci_zsh_loading_test.sh

      # ~1 min per run, so not on every branch push: record on main (one data
      # point per merged commit, comparable over time) and on manual dispatch.
      # Record-only — a slow-startup budget that fails the build is a separate,
      # future check.
      - name: Benchmark zsh startup (zsh-bench -> job summary + artifact)
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: ./bin/ci_zsh_bench.sh

      - name: Upload zsh-bench results
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zsh-bench-results
          path: ${{ runner.temp }}/zsh-bench.txt

      - name: Load to test .tmux.conf
        run: ./bin/ci_tmux_loading_test.sh

      - name: Interactive e2e (drive a real terminal, assert on rendered screen)
        run: ./bin/ci_tmux_interactive_test.sh

      - name: Interactive e2e for tmux key bindings (nested tmux, assert binds fire)
        run: ./bin/ci_tmux_keybinding_test.sh

      - name: Interactive e2e for tmux copy-mode (select + yank)
        run: ./bin/ci_tmux_copymode_test.sh

      - name: e2e for the status bar and dynamic window/pane formats
        run: ./bin/ci_tmux_status_test.sh

      - name: e2e for the Claude Code tmux state indicator (hook script + formats)
        run: ./bin/ci_claude_tmux_indicator_test.sh

      - name: Starship prompt e2e (render in a real terminal, assert segments)
        run: ./bin/ci_starship_test.sh

      - name: Interactive e2e for the g repo-jump command (ghq -> fzf -> cd)
        run: ./bin/ci_g_command_test.sh

  vim_guard_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Ensure vim + neovim + tmux are present
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends vim neovim tmux

      - name: Legacy .vimrc guard (no-plugin startup must be clean)
        run: ./bin/ci_vim_guard_test.sh

      - name: Neovim config guard (pure-Lua config loads clean, no plugins)
        run: ./bin/ci_nvim_guard_test.sh

  nvim_loading_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Ensure tmux is present
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tmux

      - name: Install Neovim (upstream stable tarball)
        # apt ships 0.9.x, but the real environment runs the latest brew nvim
        # and the config carries 0.10+/0.12+ API usage (vim.uv plugins, the
        # vim.list jetpack patch in setup_plugin.lua), so test against
        # upstream's stable channel — the same thing brew tracks.
        run: |
          set -e
          curl -fsSL -o /tmp/nvim.tar.gz \
            https://github.com/neovim/neovim/releases/download/stable/nvim-linux-x86_64.tar.gz
          sudo tar -C /opt -xzf /tmp/nvim.tar.gz
          sudo ln -sfn /opt/nvim-linux-x86_64/bin/nvim /usr/local/bin/nvim
          nvim --version | head -1

      - name: Restore nvim plugins cache
        id: cache-nvim-plugins
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          # ci_nvim_loading_test.sh points XDG_DATA_HOME here (via
          # NVIM_E2E_DATA_DIR), so this holds the jetpack clones of every
          # plugin. Keyed on setup_plugin.lua since that is where the plugin
          # list lives — editing it re-resolves the plugin set. Bump the vN to
          # evict a bad cache (same manual lever as the brew/tmux keys).
          path: ~/.nvim-e2e-data
          key: ${{ runner.os }}-nvim-plugins-${{ hashFiles('config/nvim/lua/kimoto/setup_plugin.lua') }}-v1

      - name: Neovim e2e (install all plugins, assert clean startup)
        run: NVIM_E2E_DATA_DIR="$HOME/.nvim-e2e-data" ./bin/ci_nvim_loading_test.sh

      - name: Save nvim plugins cache
        # Runs only when the e2e passed (a failed step stops the job), so a
        # half-installed tree never poisons the cache; skip on hit because
        # saving over the same key fails with "Cache already exists".
        if: steps.cache-nvim-plugins.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.nvim-e2e-data
          key: ${{ steps.cache-nvim-plugins.outputs.cache-primary-key }}
