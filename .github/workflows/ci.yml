---
name: ci
on:
  push: {}
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static_checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Install check tools
        run: ./bin/install_check_tools.sh
      - name: Lint shell scripts
        run: ./bin/lint_shell.sh
      - name: Run unit tests (bats)
        run: ./bin/run_tests.sh
      - name: Lint zsh syntax
        run: ./bin/lint_zsh.sh
      - name: Lint lua syntax
        run: ./bin/lint_lua.sh
      - name: Lint bash syntax
        run: ./bin/lint_bash.sh
      - name: Validate config files
        run: ./bin/lint_config.sh
      - name: Validate config schemas
        run: ./bin/lint_schema.sh
      - name: Check editorconfig (line length, whitespace, final newline)
        run: ./bin/lint_editorconfig.sh
      - name: Check action pinning (ratchet)
        run: ./bin/lint_actions.sh
      - name: Check Brewfile sort
        run: ./bin/check_brewfile_sort.sh
      - name: Check for sensitive filenames
        run: ./bin/check_secret_files.sh
      - name: Scan for secrets (gitleaks)
        run: gitleaks git --no-banner --redact

  zsh_loading_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Restore Homebrew cache
        id: cache-brew
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            /opt/homebrew
            /home/linuxbrew/.linuxbrew
          # The -tmux-fzf suffix is part of the key on purpose: tmux and fzf are
          # installed into this cache below (they are not in Brewfile.basic), so
          # the suffix forces one rebuild that bakes them in. Bump it if the set
          # of extra brew installs changes.
          key: ${{ runner.os }}-brew-${{ hashFiles('Brewfile.basic') }}-tmux-fzf

      - name: Restore tmux plugins cache
        id: cache-tmux-plugins
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          # tpm clones every @tpm_plugins entry into here; cache them so later
          # runs skip the clones. Keyed on .tmux.conf since that is where the
          # plugin list lives — editing it re-resolves the plugin set.
          path: ~/.tmux/plugins
          key: ${{ runner.os }}-tmux-plugins-${{ hashFiles('.tmux.conf') }}

      - name: Install homebrew if cache miss
        if: steps.cache-brew.outputs.cache-hit != 'true'
        run: ./bin/setup_homebrew.sh

      - name: Make world
        run: SKIP_BREW=1 ./bin/mkworld.sh

      - name: Install tmux and fzf (Homebrew; baked into the brew cache below)
        # tmux exercises the 3.6+ config path; fzf backs the `g` repo-jump
        # command. Neither belongs in Brewfile.basic (not needed to start the
        # shell), so install them here — before the cache save and only when
        # missing, so a cache hit costs no network.
        run: |
          set -e
          if [ -x /home/linuxbrew/.linuxbrew/bin/brew ]; then
            eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
            command -v tmux >/dev/null 2>&1 || brew install tmux
            command -v fzf >/dev/null 2>&1 || brew install fzf
          fi

      - name: Install tmux plugins if cache miss
        if: steps.cache-tmux-plugins.outputs.cache-hit != 'true'
        run: ./bin/install_tmux_plugins.sh

      - name: Save Homebrew cache
        # Only save on a cache miss; saving on a hit re-uses the same key and
        # fails with "Cache already exists" (harmless warning).
        if: always() && steps.cache-brew.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            /opt/homebrew
            /home/linuxbrew/.linuxbrew
          key: ${{ steps.cache-brew.outputs.cache-primary-key }}

      - name: Save tmux plugins cache
        if: always() && steps.cache-tmux-plugins.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.tmux/plugins
          key: ${{ steps.cache-tmux-plugins.outputs.cache-primary-key }}

      - name: Load to test .zshrc
        run: ./bin/ci_zsh_loading_test.sh

      - name: Load to test .tmux.conf
        run: ./bin/ci_tmux_loading_test.sh

      - name: Interactive e2e (drive a real terminal, assert on rendered screen)
        run: ./bin/ci_tmux_interactive_test.sh

      - name: Interactive e2e for tmux key bindings (nested tmux, assert binds fire)
        run: ./bin/ci_tmux_keybinding_test.sh

      - name: Interactive e2e for the g repo-jump command (ghq -> fzf -> cd)
        run: ./bin/ci_g_command_test.sh
