set-option -g prefix C-t
bind C-t send-prefix
unbind-key C-b
set-option -g base-index 1
set-option -g renumber-windows on

setw -g mode-keys vi
unbind-key -T copy-mode-vi v
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
unbind -T copy-mode-vi MouseDragEnd1Pane

bind-key Right join-pane -t :+
bind-key Left join-pane -t :-

# command+1 ~ 9でwindow切り替え (like chrome)
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9
bind-key -n M-t new-window

# pane move: m でmark → M で移動
bind-key M join-pane -s .


set -g set-titles on
setw -g automatic-rename on
setw -g automatic-rename-format '#{?#{&&:#{==:#{window_panes},1},#{!=:#{pane_title},#{host_short}}},#{pane_title},#{b:pane_current_path}}'
setw -g allow-rename off
set -g mouse on
set -g history-limit 50000

# tmux 3.6+ のみ適用（古い tmux では unknown option を避けるためスキップ）
if-shell 'v=$(tmux -V | sed -En "s/^tmux ([0-9]+)\.([0-9]+).*/\1 \2/p"); set -- $v; [ "$1" -gt 3 ] || { [ "$1" -eq 3 ] && [ "$2" -ge 6 ]; }' \
  "set -g default-client-command attach; set -g pane-scrollbars on; set -g pane-scrollbars-position right; set -g pane-scrollbars-style 'fg=#2aa198'"
set -g default-terminal "xterm-256color"
set -as terminal-features '*:RGB'
set -as terminal-features '*:hyperlinks'
set -as terminal-overrides ',xterm-256color:RGB'

set -g @tpm_plugins ' \
  tmux-plugins/tpm \
  tmux-plugins/tmux-sensible \
  tmux-plugins/tmux-pain-control \
  tmux-plugins/tmux-resurrect \
  tmux-plugins/tmux-continuum \
  jaclu/tmux-menus \
  laktak/extrakto \
  sainnhe/tmux-fzf \
  nhdaly/tmux-better-mouse-mode \
  alexwforsythe/tmux-which-key \
  timvw/tmux-assistant-resurrect \
'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-capture-pane-contents 'on'

set -g @extrakto_copy_key "tab"
set -g @extrakto_insert_key "enter"
set -g @extrakto_fzf_unset_default_opts "false"
set -g @extrakto_split_direction "v"
set -g @extrakto_fzf_layout "reverse"
set -g @extrakto_help_key "esc" # disabled
set -g @extrakto_edit_key "ctrl-v" # disabled
set -g @extrakto_filter_key "ctrl-g" # disabled for emacs keybind
set -g @extrakto_grab_key "ctrl-h" # = disabled for emacs keybind
set -g @extrakto_grab_area "window full"
set -g @extrakto_filter_order "line word quote"

# Status bar - Solarized Dark Powerline
set -g status-style "bg=#073642,fg=#839496"
set -g message-style "bg=#073642,fg=#2aa198"
set -g message-command-style "bg=#073642,fg=#2aa198"
set -g status-left-length 30
set -g status-right-length 100
set -g status-left "#[fg=#002b36,bg=#268bd2,bold] #h #[fg=#268bd2,bg=#073642,nobold] "
set -g status-right "#[fg=#859900,bg=#073642]#[fg=#002b36,bg=#859900,bold] ⎈ #(kubectl config current-context 2>/dev/null) #[fg=#268bd2,bg=#859900]#[fg=#002b36,bg=#268bd2,bold] %F %R "
setw -g window-status-format "#[fg=#{?window_bell_flag,#dc322f,#586e75},bg=#073642] #I:#W "
setw -g window-status-current-format "#[fg=#073642,bg=#2aa198]#[fg=#002b36,bg=#2aa198,bold] #I:#W #[fg=#2aa198,bg=#073642]"
setw -g window-status-separator ""

# '~/.tmux/plugins/tpm/tpm' returned 127 (on macOS, w/ tmux installed using brew)
# https://github.com/tmux-plugins/tpm/blob/master/docs/tpm_not_working.md
set-environment -g PATH "/opt/homebrew/bin:/home/linuxbrew/.linuxbrew/bin:/bin:/usr/bin"
run '~/.tmux/plugins/tpm/tpm'

# Solarized pane styling (after tpm to override plugin defaults)
set-option -g pane-border-status top
set-option -g pane-border-format " ###{pane_index}: #{?#{==:#{pane_title},#{host_short}},#{pane_current_command},#{pane_title}} "
set-option -g pane-border-lines heavy
set-option -g pane-border-style "fg=#2c4a52"
set-option -g pane-active-border-style "fg=#2aa198"
# tmux 3.6+ のみ適用（古い tmux では unknown option を避けるためスキップ）
if-shell 'v=$(tmux -V | sed -En "s/^tmux ([0-9]+)\.([0-9]+).*/\1 \2/p"); set -- $v; [ "$1" -gt 3 ] || { [ "$1" -eq 3 ] && [ "$2" -ge 6 ]; }' \
  'set -g copy-mode-selection-style "bg=#2aa198,fg=#002b36"'
set-option -g window-style "bg=default"
set-option -g window-active-style "bg=default"

# activity フラグを window 切り替え時にリセット
set-hook -g after-select-window "set-option -w monitor-activity off; set-option -w monitor-activity on"

# Claude Code: tmux 内で通知・タイトル変更を有効化
set -g allow-passthrough on
set -g monitor-activity off
set -g visual-activity off
set -g monitor-bell on
setw -g window-status-activity-style "fg=#b58900,bold"
setw -g window-status-bell-style "fg=#dc322f,bold"

source-file -q ~/.tmux.conf.local
