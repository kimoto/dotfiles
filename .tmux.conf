set-option -g prefix C-t
bind C-t send-prefix
unbind-key C-b
set-option -g base-index 1
set-option -g renumber-windows on

setw -g mode-keys vi
unbind-key -T copy-mode-vi v
bind-key -T copy-mode-vi v send-keys -X begin-selection
# yank into the system clipboard: pbcopy (macOS) / wl-copy (Wayland) /
# xclip (X11); when none exist (headless), OSC52 via set-clipboard still works
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \
  "pbcopy 2>/dev/null || wl-copy 2>/dev/null || xclip -selection clipboard -in 2>/dev/null || true"
unbind -T copy-mode-vi MouseDragEnd1Pane
bind-key -T copy-mode-vi '[' send-keys -X previous-prompt
bind-key -T copy-mode-vi ']' send-keys -X next-prompt

bind-key Right join-pane -t :+
bind-key Left join-pane -t :-

# command+1 ~ 9でwindow切り替え (like chrome)
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9
bind-key -n M-t new-window

# pane navigation (like vim hjkl)
bind-key -n M-h select-pane -L
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-l select-pane -R

# command+option+←/→でwindow移動
bind-key -n M-Left previous-window
bind-key -n M-Right next-window

# command+option+↑/↓でsession移動
bind-key -n M-Up switch-client -p
bind-key -n M-Down switch-client -n

# pane move: m でmark → M で移動
bind-key M join-pane -s .


set -g set-titles on
setw -g automatic-rename on
setw -g automatic-rename-format '#{?#{&&:#{==:#{window_panes},1},#{!=:#{pane_title},#{host_short}}},#{pane_title},#{b:pane_current_path}}'
setw -g allow-rename off
set -g mouse on
set -g history-limit 50000

# tmux 3.6+ のみ適用（古い tmux では unknown option を避けるためスキップ）
if-shell 'v=$(tmux -V | sed -En "s/^tmux ([0-9]+)\.([0-9]+).*/\1 \2/p"); set -- $v; [ "$1" -gt 3 ] || { [ "$1" -eq 3 ] && [ "$2" -ge 6 ]; }' \
  "set -g default-client-command attach; set -g pane-scrollbars on; set -g pane-scrollbars-position right; set -g pane-scrollbars-style 'fg=#2aa198'"
set -g default-terminal "xterm-256color"
set -as terminal-features '*:RGB'
set -as terminal-features '*:hyperlinks'
set -as terminal-features '*:clipboard'
set -as terminal-overrides ',xterm-256color:RGB'
set -g set-clipboard on

set -g @tpm_plugins ' \
  tmux-plugins/tpm \
  tmux-plugins/tmux-sensible \
  tmux-plugins/tmux-pain-control \
  tmux-plugins/tmux-resurrect \
  tmux-plugins/tmux-continuum \
  jaclu/tmux-menus \
  laktak/extrakto \
  sainnhe/tmux-fzf \
  nhdaly/tmux-better-mouse-mode \
  timvw/tmux-assistant-resurrect \
'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-capture-pane-contents 'on'

set -g @extrakto_copy_key "tab"
set -g @extrakto_insert_key "enter"
set -g @extrakto_fzf_unset_default_opts "false"
set -g @extrakto_split_direction "v"
set -g @extrakto_fzf_layout "reverse"
set -g @extrakto_help_key "esc" # disabled
set -g @extrakto_edit_key "ctrl-v" # disabled
set -g @extrakto_filter_key "ctrl-g" # disabled for emacs keybind
set -g @extrakto_grab_key "ctrl-h" # = disabled for emacs keybind
set -g @extrakto_grab_area "window full"
set -g @extrakto_filter_order "line word quote"

# Status bar - Solarized Dark Powerline
set -g status-style "bg=#073642,fg=#839496"
set -g message-style "bg=#073642,fg=#2aa198"
set -g message-command-style "bg=#073642,fg=#2aa198"
set -g status-left-length 50
set -g status-right-length 100
set -g status-left "#[fg=#002b36,bg=#268bd2,bold] #(tmux list-sessions -F '##{?session_attached,#[fg=#fdf6e3]#[bg=#268bd2]●,#[fg=#002b36]#[bg=#268bd2]•}' | tr -d '\n') #{session_name} #[fg=#268bd2,bg=#073642,nobold] "
set -g status-right "#[fg=#859900,bg=#073642]#[fg=#002b36,bg=#859900,bold] ⎈ #(kubectl config current-context 2>/dev/null) #[fg=#268bd2,bg=#859900]#[fg=#002b36,bg=#268bd2,bold] %F %R "
# Claude Code state indicator: bin/claude_tmux_indicator.sh tags panes with
# @claude_state (waiting=red #dc322f, done=yellow #b58900, red wins); the
# hooks below recompute the window color when panes move or die. Deferred via
# run-shell -b, and the status formats read only the plain @claude_color:
# evaluating #{P:} mid-command or at draw time crashes tmux 3.7. Bell keeps
# priority; with no state set the formats render exactly as before.
set -g @claude_win_color '#{?#{m:*waiting*,#{P:#{@claude_state}}},#dc322f,#{?#{m:*done*,#{P:#{@claude_state}}},#b58900,}}'
set-hook -ga window-layout-changed 'run-shell -b "tmux set-option -wF -t \"#{window_id}\" @claude_color \"##{E:@claude_win_color}\""'
set-hook -ga window-linked 'run-shell -b "tmux set-option -wF -t \"#{window_id}\" @claude_color \"##{E:@claude_win_color}\""'
setw -g window-status-format "#[fg=#{?window_bell_flag,#dc322f,#{?#{@claude_color},#{@claude_color},#586e75}},bg=#073642]#{?#{@claude_color},#[bold],} #I:#W#{?#{@claude_color}, ✳,} "
setw -g window-status-current-format "#[fg=#073642,bg=#{?#{@claude_color},#{@claude_color},#2aa198}]#[fg=#002b36,bg=#{?#{@claude_color},#{@claude_color},#2aa198},bold] #I:#W#{?#{@claude_color}, ✳,} #[fg=#{?#{@claude_color},#{@claude_color},#2aa198},bg=#073642]"
setw -g window-status-separator ""

# '~/.tmux/plugins/tpm/tpm' returned 127 (on macOS, w/ tmux installed using brew)
# https://github.com/tmux-plugins/tpm/blob/master/docs/tpm_not_working.md
# Prepend the brew dir instead of replacing PATH, so ~/.local/bin etc. survive.
# Split per platform: a nonexistent /home/linuxbrew entry in PATH makes every
# command lookup stat /home, which on macOS is an autofs mount that can fire a
# Directory Services (AD) lookup per stat. uname keeps the probe stat-free.
if-shell 'test "$(uname)" = Linux' \
  'set-environment -g PATH "/home/linuxbrew/.linuxbrew/bin:$PATH"' \
  'set-environment -g PATH "/opt/homebrew/bin:$PATH"'
run '~/.tmux/plugins/tpm/tpm'

bind-key Space next-layout

# Solarized pane styling (after tpm to override plugin defaults)
set-option -g pane-border-status top
set-option -g pane-border-format " ###{pane_index}: #{?#{==:#{pane_title},#{host_short}},#{pane_current_command},#{pane_title}} "
set-option -g pane-border-lines heavy
set-option -g pane-border-style "fg=#2c4a52"
set-option -g pane-active-border-style "fg=#2aa198"
# tmux 3.6+ のみ適用（古い tmux では unknown option を避けるためスキップ）
if-shell 'v=$(tmux -V | sed -En "s/^tmux ([0-9]+)\.([0-9]+).*/\1 \2/p"); set -- $v; [ "$1" -gt 3 ] || { [ "$1" -eq 3 ] && [ "$2" -ge 6 ]; }' \
  'set -g copy-mode-selection-style "bg=#2aa198,fg=#002b36"'
set-option -g window-style "bg=default"
set-option -g window-active-style "bg=default"

# activity フラグを window 切り替え時にリセット
set-hook -g after-select-window "set-option -w monitor-activity off; set-option -w monitor-activity on"

# status-left の session 一覧(#())は status-interval でしか再評価されないため、
# session 切り替え直後に即時反映させる
set-hook -g client-session-changed "refresh-client -S"

# Claude Code: tmux 内で通知・タイトル変更を有効化
set -g allow-passthrough on
set -g monitor-activity off
set -g visual-activity off
set -g monitor-bell on
setw -g window-status-activity-style "fg=#b58900,bold"
setw -g window-status-bell-style "fg=#dc322f,bold"

source-file -q ~/.tmux.conf.local
