# pre-commit / pre-push run the SAME bin/ scripts that CI runs, so problems
# surface locally before a push instead of waiting for CI. The check logic
# lives only in those scripts (single source of truth, no duplication).
pre-commit:
  parallel: true
  commands:
    # Block direct commits to main: work happens on feature branches + PRs.
    # GitHub branch protection is the server-side enforcement; this is the
    # fast local feedback. Bypass intentionally with: git commit --no-verify
    protect-main:
      run: ./bin/protect_main.sh commit
    shell-lint:
      glob: "*.sh"
      run: ./bin/lint_shell.sh {staged_files}
    unit-tests:
      glob:
        - "bin/*.sh"
        - "test/*.bats"
      run: ./bin/run_tests.sh
    zsh-syntax:
      glob:
        - ".zshrc"
        - ".zshenv"
        - ".zprofile"
        - "*.zsh"
      run: ./bin/lint_zsh.sh {staged_files}
    lua-syntax:
      glob: "*.lua"
      run: ./bin/lint_lua.sh {staged_files}
    bash-syntax:
      glob:
        - ".bashrc"
        - ".bash_profile"
        - ".bash_login"
        - ".bash_logout"
        - ".bash_aliases"
        - "*.bash"
      run: ./bin/lint_bash.sh {staged_files}
    config-syntax:
      glob:
        - "*.toml"
        - "*.json"
        - "*.jsonc"
        - "*.yaml"
        - "*.yml"
      run: ./bin/lint_config.sh {staged_files}
    schema-validate:
      glob:
        - "*.toml"
        - "*.json"
        - "*.jsonc"
        - "*.yaml"
        - "*.yml"
      run: ./bin/lint_schema.sh {staged_files}
    editorconfig:
      run: ./bin/lint_editorconfig.sh {staged_files}
    action-pinning:
      glob:
        - ".github/workflows/*.yml"
        - ".github/workflows/*.yaml"
      run: ./bin/lint_actions.sh
    brewfile-sort:
      glob: "Brewfile.*"
      run: ./bin/check_brewfile_sort.sh
    tools-list:
      glob:
        - "Brewfile.*"
        - "TOOLS.md"
        - "bin/gen_tools_list.sh"
      run: ./bin/gen_tools_list.sh --check
    secret-files:
      run: ./bin/check_secret_files.sh {staged_files}
    gitleaks:
      run: gitleaks git --staged --no-banner --redact

pre-push:
  commands:
    # Refuse to push anything to refs/heads/main. lefthook feeds the git
    # pre-push stdin (each line: <local-ref> <local-sha> <remote-ref> <remote-sha>)
    # to the command, so we can inspect exactly what is being pushed.
    protect-main:
      run: ./bin/protect_main.sh push
    gitleaks-full:
      run: gitleaks git --no-banner --redact

commit-msg:
  commands:
    conventional:
      run: ./bin/check_commit_msg.sh {1}
