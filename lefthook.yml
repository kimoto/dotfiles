# pre-commit / pre-push run the SAME bin/ scripts that CI runs, so problems
# surface locally before a push instead of waiting for CI. The check logic
# lives only in those scripts (single source of truth, no duplication).
pre-commit:
  parallel: true
  commands:
    # Block direct commits to main: work happens on feature branches + PRs.
    # GitHub branch protection is the server-side enforcement; this is the
    # fast local feedback. Bypass intentionally with: git commit --no-verify
    protect-main:
      run: |
        branch=$(git rev-parse --abbrev-ref HEAD)
        if [ "$branch" = "main" ]; then
          echo "x Direct commits to 'main' are blocked."
          echo "  Create a feature branch and open a PR:"
          echo "    git switch -c <type>/<short-desc>"
          echo "  Intentional bypass: git commit --no-verify"
          exit 1
        fi
    shell-lint:
      glob: "bin/*.sh"
      run: ./bin/lint_shell.sh
    unit-tests:
      glob:
        - "bin/*.sh"
        - "test/*.bats"
      run: ./bin/run_tests.sh
    zsh-syntax:
      glob:
        - ".zshrc"
        - ".zshenv"
        - ".zprofile"
        - "*.zsh"
      run: ./bin/lint_zsh.sh {staged_files}
    config-syntax:
      glob:
        - "*.toml"
        - "*.json"
        - "*.jsonc"
        - "*.yaml"
        - "*.yml"
      run: ./bin/lint_config.sh {staged_files}
    schema-validate:
      glob:
        - "*.toml"
        - "*.json"
        - "*.jsonc"
        - "*.yaml"
        - "*.yml"
      run: ./bin/lint_schema.sh {staged_files}
    editorconfig:
      run: ./bin/lint_editorconfig.sh {staged_files}
    action-pinning:
      glob:
        - ".github/workflows/*.yml"
        - ".github/workflows/*.yaml"
      run: ./bin/lint_actions.sh
    brewfile-sort:
      glob: "Brewfile.*"
      run: ./bin/check_brewfile_sort.sh
    secret-files:
      run: ./bin/check_secret_files.sh {staged_files}
    gitleaks:
      run: gitleaks git --staged --no-banner --redact

pre-push:
  commands:
    # Refuse to push anything to refs/heads/main. lefthook feeds the git
    # pre-push stdin (each line: <local-ref> <local-sha> <remote-ref> <remote-sha>)
    # to the command, so we can inspect exactly what is being pushed.
    protect-main:
      run: |
        while read -r _ _ remote_ref _; do
          case "$remote_ref" in
            refs/heads/main)
              echo "x Direct push to 'main' is blocked. Open a PR instead."
              echo "  Intentional bypass: git push --no-verify"
              exit 1
              ;;
          esac
        done
    gitleaks-full:
      run: gitleaks git --no-banner --redact

commit-msg:
  commands:
    conventional:
      run: |
        msg=$(head -1 "{1}")
        case "$msg" in
          Merge*|Revert*|"fixup! "*|"squash! "*) exit 0 ;;
        esac
        if echo "$msg" | grep -qE '^(feat|fix|chore|docs|refactor|ci|revert)(\([a-z0-9-]+\))?!?: .+'; then
          exit 0
        fi
        echo "x Not a valid Conventional Commits message:"
        echo "    $msg"
        echo "  example: feat(ghostty): add opacity toggle keybind"
        echo "  type: feat|fix|chore|docs|refactor|ci|revert"
        exit 1
